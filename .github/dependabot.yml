version: 2
updates:
  - package-ecosystem: gradle
    directory: "/hiero-dependency-versions"
    schedule:
      interval: weekly
    assignees:
      - "swirlds-automation"
    labels:
      - "dependencies"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - "swirlds-automation"
    labels:
      - "dependencies"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - "swirlds-automation"
    labels:
      - "dependencies"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    groups:
      all-actions:
        patterns:
          - "*"
